kind = "web"
previewPath = "/"
title = "North West Hope"
version = "1.0.0"
id = "artifacts/north-west-hope"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19322

[services.development]
run = "pnpm --filter @workspace/north-west-hope run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/north-west-hope", "run", "build" ]
publicDir = "artifacts/north-west-hope/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19322"
BASE_PATH = "/"
